{% extends "base.html" %}
{% block title %}{{ title }} - Markdown Docs{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1>{{ title }}</h1>
        <small class="text-muted">{{ display_name }}</small>
    </div>
    <div>
        {% if current_user.is_authenticated %}
        <a href="/docs/{{ filename }}/edit" class="btn btn-outline-primary btn-sm">✏️ 编辑</a>
        {% endif %}
        <a href="/docs" class="btn btn-outline-secondary btn-sm">📚 文档列表</a>
    </div>
</div>

<div class="markdown-body">
    {{ content|safe }}
</div>

<div class="mt-4 text-muted">
    <small>最后修改：{{ mtime }}</small>
</div>
{% endblock %}
